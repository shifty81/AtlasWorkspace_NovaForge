# ─── Arbiter — docker-compose.yml (Phase 5 / P5-1) ───────────────────────────
#
# One-command self-hosted Arbiter backend + optional Ollama.
#
# Quick start:
#   docker compose up -d
#
# With Ollama included:
#   docker compose --profile ollama up -d
# ─────────────────────────────────────────────────────────────────────────────

version: "3.9"

services:

  # ── ArbiterEngine + PythonBridge (combined image) ─────────────────────────
  arbiter-engine:
    build:
      context: .
      dockerfile: Dockerfile
    image: arbiter-engine:latest
    container_name: arbiter-engine
    restart: unless-stopped
    ports:
      - "${ARBITER_ENGINE_PORT:-8001}:8001"
      - "${ARBITER_BRIDGE_PORT:-8000}:8000"
    environment:
      ARBITER_ENGINE_PORT: "${ARBITER_ENGINE_PORT:-8001}"
      ARBITER_BRIDGE_PORT: "${ARBITER_BRIDGE_PORT:-8000}"
      OLLAMA_HOST: "http://ollama:11434"
      ARBITER_LLM_BACKEND: "${ARBITER_LLM_BACKEND:-ollama}"
      ARBITER_LOG_LEVEL: "${ARBITER_LOG_LEVEL:-info}"
      ARBITER_REQUIRE_API_KEY: "${ARBITER_REQUIRE_API_KEY:-false}"
    volumes:
      - arbiter-config:/app/arbiter-config
      - arbiter-configs:/app/configs
      - arbiter-plugins:/app/plugins
      - arbiter-workspace:/app/workspace
      - arbiter-memory:/app/Memory
      - arbiter-logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8001/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - arbiter-net
    # Depends on Ollama only when the 'ollama' profile is active
    depends_on:
      ollama:
        condition: service_healthy
        required: false

  # ── Ollama (optional — activate with --profile ollama) ─────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: arbiter-ollama
    profiles: ["ollama"]
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:11434/api/tags"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - arbiter-net

# ── Named volumes ──────────────────────────────────────────────────────────────
volumes:
  arbiter-config:
    driver: local
  arbiter-configs:
    driver: local
  arbiter-plugins:
    driver: local
  arbiter-workspace:
    driver: local
  arbiter-memory:
    driver: local
  arbiter-logs:
    driver: local
  ollama-models:
    driver: local

# ── Networks ───────────────────────────────────────────────────────────────────
networks:
  arbiter-net:
    driver: bridge
